<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator glass">
        <h2>Tip Calculator</h2>
        <form id="tip-form">
            <div class="form-group">
                <label for="bill">Bill Amount ($)</label>
                <input type="number" id="bill" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="tip">Tip Percentage (%)</label>
                <input type="number" id="tip" min="0" value="15" required>
            </div>
            <div class="form-group">
                <label for="people">Number of People</label>
                <input type="number" id="people" min="1" value="1" required>
            </div>
            <button type="submit" class="btn">Calculate</button>
        </form>
        
        <div id="results" class="hidden">
            <div class="result-row">
                <span>Tip Amount</span>
                <span id="tip-amount">$0.00</span>
            </div>
            <div class="result-row">
                <span>Total Amount</span>
                <span id="total-amount">$0.00</span>
            </div>
            <div class="result-row">
                <span>Per Person</span>
                <span id="per-person">$0.00</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
