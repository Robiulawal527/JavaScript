<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container glass">
        <h1>Rock, Paper, Scissors</h1>
        
        <div class="scoreboard">
            <div class="score">
                <span id="user-score">0</span>
                <p>Player</p>
            </div>
            <div class="score">
                <span id="computer-score">0</span>
                <p>Computer</p>
            </div>
        </div>

        <div class="result">
            <p>Make your move!</p>
        </div>

        <div class="choices">
            <button class="choice" id="r">✊ Rock</button>
            <button class="choice" id="p">✋ Paper</button>
            <button class="choice" id="s">✌️ Scissors</button>
        </div>

        <p id="action-message">First to score 10 wins!</p>
        <button id="reset" class="hidden">Play Again</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
